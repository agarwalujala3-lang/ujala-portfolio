services:
  - type: web
    name: ujala-portfolio
    runtime: static
    plan: free
    branch: main
    autoDeploy: true
    buildCommand: npm run build:render
    staticPublishPath: ./dist
    envVars:
      - key: PUBLIC_SITE_BASE
        value: https://ujala-portfolio-world.netlify.app
    headers:
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
      - path: /*
        name: Referrer-Policy
        value: strict-origin-when-cross-origin
