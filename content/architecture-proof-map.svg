<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="760" viewBox="0 0 1280 760" role="img" aria-labelledby="title desc">
  <title id="title">Ujala portfolio architecture proof map</title>
  <desc id="desc">A high-tech architecture map showing portfolio inputs, API routes, storage, AI analysis, GitHub proof, and Render deployment.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1"><stop offset="0" stop-color="#071321"/><stop offset="0.48" stop-color="#08182b"/><stop offset="1" stop-color="#030814"/></linearGradient>
    <linearGradient id="line" x1="0" y1="0" x2="1" y2="0"><stop offset="0" stop-color="#8df4ff" stop-opacity="0"/><stop offset="0.25" stop-color="#8df4ff"/><stop offset="0.68" stop-color="#74e6b6"/><stop offset="1" stop-color="#8aa8ff" stop-opacity="0.1"/></linearGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0" stop-color="#8df4ff" stop-opacity="0.58"/><stop offset="1" stop-color="#8df4ff" stop-opacity="0"/></radialGradient>
    <filter id="softGlow" x="-30%" y="-40%" width="160%" height="180%"><feGaussianBlur stdDeviation="10" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse"><path d="M48 0H0V48" fill="none" stroke="#8df4ff" stroke-opacity="0.07"/></pattern>
  </defs>
  <rect width="1280" height="760" rx="38" fill="url(#bg)"/>
