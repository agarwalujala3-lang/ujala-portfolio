<svg width="1280" height="720" viewBox="0 0 1280 720" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ujala Agarwal portfolio GitHub preview</title>
  <desc id="desc">A premium editorial preview banner for the adaptive cinematic portfolio, showing visitor lenses, featured projects, and system proof.</desc>
  <defs>
    <linearGradient id="bg" x1="122" y1="96" x2="1165" y2="681" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F8F1E7"/>
      <stop offset="0.44" stop-color="#EFF4F2"/>
      <stop offset="1" stop-color="#E2F0F4"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(277 175) rotate(54.9252) scale(440.518 299.271)">
      <stop stop-color="#F4BC74" stop-opacity="0.26"/>
      <stop offset="1" stop-color="#F4BC74" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1062 213) rotate(145.922) scale(478.933 327.351)">
      <stop stop-color="#77DAFF" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#77DAFF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="cardWarm" x1="79" y1="263" x2="576" y2="583" gradientUnits="userSpaceOnUse">
      <stop stop-color="#FFFDF9"/>
      <stop offset="1" stop-color="#F3EFE8"/>
    </linearGradient>
    <linearGradient id="cardCool" x1="704" y1="263" x2="1186" y2="577" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F4FCFF"/>
      <stop offset="1" stop-color="#E5F4F8"/>
    </linearGradient>
    <linearGradient id="receiptIcon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F9F7F1"/>
      <stop offset="1" stop-color="#DCE9E3"/>
    </linearGradient>
    <linearGradient id="lumenIcon" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#0B1320"/>
      <stop offset="1" stop-color="#1F3443"/>
    </linearGradient>
    <linearGradient id="badgeWarm" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#ECF4EE"/>
      <stop offset="1" stop-color="#E5F0EA"/>
    </linearGradient>
    <linearGradient id="badgeCool" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#EDF7FA"/>
      <stop offset="1" stop-color="#E0F0F5"/>
    </linearGradient>
    <filter id="blurLarge" x="-160" y="-160" width="1600" height="1040" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="44"/>
    </filter>
    <filter id="panelShadow" x="36" y="14" width="1208" height="680" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="18"/>
      <feGaussianBlur stdDeviation="22"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.282353 0 0 0 0 0.219608 0 0 0 0 0.152941 0 0 0 0.12 0"/>
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
    </filter>
    <filter id="softGlow" x="886" y="284" width="108" height="108" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="12"/>
    </filter>
  </defs>

  <rect width="1280" height="720" rx="32" fill="#F7F4EE"/>
  <g filter="url(#panelShadow)">
    <rect x="58" y="34" width="1164" height="652" rx="34" fill="url(#bg)"/>
    <rect x="58.75" y="34.75" width="1162.5" height="650.5" rx="33.25" stroke="#455C53" stroke-opacity="0.16"/>
  </g>

  <g filter="url(#blurLarge)">
    <ellipse cx="282" cy="188" rx="228" ry="132" fill="url(#glowGold)"/>
    <ellipse cx="1035" cy="221" rx="246" ry="144" fill="url(#glowBlue)"/>
  </g>

  <path d="M122 72H1158" stroke="#D8D6D0"/>
  <path d="M122 112H1158" stroke="#ECE6DB"/>

  <text x="122" y="128" fill="#1C2A2C" font-family="Georgia, 'Times New Roman', serif" font-size="29" font-weight="700">Ujala Agarwal</text>
  <text x="122" y="164" fill="#5A6766" font-family="'Segoe UI', Arial, sans-serif" font-size="16">Adaptive cinematic portfolio with lens-aware storytelling, synced GitHub runtime, and product-grade project proof.</text>

  <g opacity="0.95">
    <rect x="818" y="88" width="102" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.76" stroke="#D4DDD8"/>
    <text x="849" y="112" fill="#2C5955" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.18em">RECRUITER</text>
    <rect x="932" y="88" width="95" height="38" rx="19" fill="#E7F2F6" stroke="#C4DCE6"/>
    <text x="961" y="112" fill="#24576A" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.18em">ENGINEER</text>
    <rect x="1039" y="88" width="91" height="38" rx="19" fill="#FFFFFF" fill-opacity="0.76" stroke="#D4DDD8"/>
    <text x="1066" y="112" fill="#2C5955" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.18em">FOUNDER</text>
  </g>

  <text x="122" y="239" fill="#2D5E58" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.22em">FEATURED WORK</text>
  <text x="122" y="282" fill="#1B2227" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700">Proof-first case studies with live systems and real products.</text>

  <g>
    <rect x="92" y="322" width="520" height="260" rx="28" fill="url(#cardWarm)" stroke="#D9DDD8"/>
    <rect x="124" y="356" width="70" height="70" rx="22" fill="url(#receiptIcon)" stroke="#CAD6D0"/>
    <text x="144" y="401" fill="#245B51" font-family="Georgia, 'Times New Roman', serif" font-size="27" font-weight="700">RP</text>

    <text x="222" y="366" fill="#7D8987" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.24em">FLAGSHIP SYSTEM</text>
    <text x="222" y="407" fill="#1B2227" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">ReceiptPulse</text>

    <rect x="222" y="430" width="210" height="38" rx="19" fill="url(#badgeWarm)" stroke="#C5D5CF"/>
    <text x="244" y="454" fill="#2F625D" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.22em">FLAGSHIP AWS BUILD</text>

    <text x="124" y="504" fill="#5B6664" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Private receipt workspace with sign-in, OCR extraction, duplicate handling,</text>
    <text x="124" y="532" fill="#5B6664" font-family="'Segoe UI', Arial, sans-serif" font-size="18">review flow, and dashboard proof built for real user operations.</text>
  </g>

  <g>
    <rect x="668" y="322" width="520" height="260" rx="28" fill="url(#cardCool)" stroke="#D0E0E6"/>
    <rect x="700" y="356" width="70" height="70" rx="22" fill="url(#lumenIcon)" stroke="#2A4A55"/>
    <g filter="url(#softGlow)">
      <circle cx="940" cy="338" r="18" fill="#6EE8FF" fill-opacity="0.48"/>
    </g>
    <path d="M733 376L745 389L758 376" stroke="#84E9FF" stroke-width="3.2" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M745 351V404" stroke="#E6FBFF" stroke-width="8" stroke-linecap="round"/>
    <path d="M726 381L745 395L764 381" stroke="#4FD3FF" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
    <circle cx="726" cy="370" r="4.5" fill="#7EE7FF"/>
    <circle cx="764" cy="370" r="4.5" fill="#7EE7FF"/>
    <circle cx="745" cy="409" r="4.5" fill="#7EE7FF"/>

    <text x="798" y="366" fill="#7D8987" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.24em">AI TOOLING PRODUCT</text>
    <text x="798" y="407" fill="#1B2227" font-family="Georgia, 'Times New Roman', serif" font-size="26" font-weight="700">LumenStack AI</text>

    <rect x="798" y="430" width="186" height="38" rx="19" fill="url(#badgeCool)" stroke="#C2DCE6"/>
    <text x="821" y="454" fill="#35647B" font-family="'Segoe UI', Arial, sans-serif" font-size="12" font-weight="700" letter-spacing="0.22em">FLAGSHIP AI BUILD</text>

    <text x="700" y="504" fill="#55686F" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Codebase analysis product with repo parsing, guided explanations, compare mode,</text>
    <text x="700" y="532" fill="#55686F" font-family="'Segoe UI', Arial, sans-serif" font-size="18">Mermaid outputs, and a stronger engineering signal for unfamiliar systems.</text>
  </g>

  <g>
    <rect x="92" y="606" width="1096" height="52" rx="22" fill="#FFFCF7" fill-opacity="0.88" stroke="#DBDDD8"/>
    <text x="126" y="638" fill="#2E5E59" font-family="'Segoe UI', Arial, sans-serif" font-size="13" font-weight="700" letter-spacing="0.2em">LENS-AWARE ROUTING</text>
    <text x="336" y="638" fill="#636C6D" font-family="'Segoe UI', Arial, sans-serif" font-size="17">GitHub-synced runtime, curated manifests, resume PDFs, and unified case-study structure.</text>
  </g>
</svg>
