<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ujala Agarwal Portfolio GitHub preview</title>
  <desc id="desc">Premium GitHub preview for the adaptive portfolio system, showing runtime sync, visitor lenses, and proof-first presentation.</desc>
  <defs>
    <linearGradient id="bg" x1="92" y1="44" x2="1494" y2="846" gradientUnits="userSpaceOnUse">
      <stop stop-color="#08121F"/>
      <stop offset="0.46" stop-color="#102231"/>
      <stop offset="1" stop-color="#163849"/>
    </linearGradient>
    <radialGradient id="glowGold" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(252 176) rotate(16) scale(436 262)">
      <stop stop-color="#F4C37D" stop-opacity="0.28"/>
      <stop offset="1" stop-color="#F4C37D" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowBlue" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1292 706) rotate(150) scale(362 220)">
      <stop stop-color="#77E9FF" stop-opacity="0.24"/>
      <stop offset="1" stop-color="#77E9FF" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="frame" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#87F1FF"/>
      <stop offset="1" stop-color="#7A97FF"/>
    </linearGradient>
    <linearGradient id="mono" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#F7F0DE"/>
      <stop offset="1" stop-color="#9EEFFF"/>
    </linearGradient>
    <linearGradient id="name" x1="194" y1="92" x2="492" y2="146" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F3FBFF"/>
      <stop offset="0.64" stop-color="#C9E7F7"/>
      <stop offset="1" stop-color="#8DA9FF"/>
    </linearGradient>
    <linearGradient id="chipStroke" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#82F4FF"/>
      <stop offset="1" stop-color="#5B94E8"/>
    </linearGradient>
    <linearGradient id="panelFill" x1="1038" y1="216" x2="1472" y2="594" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12293C" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#0C1E2C" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="panelStroke" x1="1042" y1="210" x2="1466" y2="594" gradientUnits="userSpaceOnUse">
      <stop stop-color="#88F4FF"/>
      <stop offset="1" stop-color="#7A99FF"/>
    </linearGradient>
    <linearGradient id="lineStroke" x1="1178" y1="0" x2="1408" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#88F8FF"/>
      <stop offset="1" stop-color="#84A2FF"/>
    </linearGradient>
    <filter id="panelGlow" x="986" y="172" width="542" height="470" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
      <feBlend mode="normal" in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
      <feDropShadow dx="0" dy="0" stdDeviation="18" flood-color="#7AEFFF" flood-opacity="0.28"/>
      <feDropShadow dx="0" dy="26" stdDeviation="34" flood-color="#08121E" flood-opacity="0.44"/>
    </filter>
    <filter id="softBlur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="34"/>
    </filter>
  </defs>

  <rect width="1600" height="900" rx="42" fill="url(#bg)"/>
  <ellipse cx="252" cy="176" rx="354" ry="232" fill="url(#glowGold)"/>
  <ellipse cx="1292" cy="706" rx="306" ry="194" fill="url(#glowBlue)"/>

  <g opacity="0.24" filter="url(#softBlur)">
    <path d="M126 744C300 690 470 666 676 682" stroke="#E8BD7B" stroke-width="20" stroke-linecap="round"/>
    <path d="M1050 784C1182 752 1324 686 1454 554" stroke="#7BE6FF" stroke-width="18" stroke-linecap="round"/>
  </g>

  <rect x="96" y="76" width="74" height="74" rx="22" fill="#0D1928" stroke="url(#frame)" stroke-opacity="0.58" stroke-width="1.8"/>
  <path d="M114 94V118C114 127.4 119.4 133 129.2 133C139.1 133 144 127.3 144 118V94" stroke="url(#mono)" stroke-width="5.2" stroke-linecap="round" stroke-linejoin="round"/>
  <path d="M120 94V113.5C120 119.3 123 123 129.2 123C135.4 123 138 119.4 138 113.5V94" stroke="#7DDFFF" stroke-opacity="0.45" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="194" y="106" fill="#97B6C7" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700" letter-spacing="4.8">ADAPTIVE PORTFOLIO</text>
  <text x="194" y="144" fill="url(#name)" font-family="Segoe UI, Arial, sans-serif" font-size="44" font-weight="800" letter-spacing="1.2">Ujala Agarwal</text>

  <text x="96" y="308" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">Adaptive portfolio layer</text>
  <text x="96" y="372" fill="#F7FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="62" font-weight="800">for proof and product signal</text>

  <text x="96" y="444" fill="#C2D3DE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">Lens-aware storytelling, GitHub-synced runtime, project manifests,</text>
  <text x="96" y="482" fill="#C2D3DE" font-family="Segoe UI, Arial, sans-serif" font-size="28" font-weight="500">and case studies that read like a product instead of a gallery.</text>

  <g>
    <rect x="96" y="556" width="218" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="205" y="592" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Recruiter lens</text>

    <rect x="336" y="556" width="222" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="447" y="592" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Engineer mode</text>

    <rect x="580" y="556" width="212" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="686" y="592" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Founder route</text>

    <rect x="96" y="630" width="198" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="195" y="666" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Runtime sync</text>

    <rect x="316" y="630" width="194" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="413" y="666" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Pico brain</text>

    <rect x="532" y="630" width="240" height="56" rx="28" fill="#0F2131" stroke="url(#chipStroke)"/>
    <text x="652" y="666" text-anchor="middle" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="23" font-weight="700">Case-study proof</text>
  </g>

  <text x="96" y="792" fill="#9CB9C9" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="600">github.com/agarwalujala3-lang/ujala-portfolio</text>
  <text x="96" y="836" fill="#D2DDE7" font-family="Segoe UI, Arial, sans-serif" font-size="22" font-weight="500">Built with HTML, CSS, JavaScript, CloudFront, and repo-driven GitHub runtime sync</text>

  <g filter="url(#panelGlow)">
    <rect x="1044" y="224" width="420" height="370" rx="34" fill="url(#panelFill)" stroke="url(#panelStroke)"/>
    <rect x="1086" y="264" width="338" height="54" rx="16" fill="#0E2131" stroke="#356280"/>
    <circle cx="1120" cy="291" r="8.5" fill="#8AF7FF"/>
    <text x="1146" y="300" fill="#E9FAFF" font-family="Consolas, monospace" font-size="20" font-weight="700">Portfolio runtime system</text>

    <rect x="1094" y="386" width="138" height="82" rx="20" fill="#12283A" stroke="#36617D"/>
    <text x="1128" y="418" fill="#9AF8FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">INPUT</text>
    <text x="1118" y="446" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">GitHub repos</text>

    <rect x="1280" y="386" width="138" height="82" rx="20" fill="#12283A" stroke="#36617D"/>
    <text x="1315" y="418" fill="#9AF8FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">SYNC</text>
    <text x="1295" y="446" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Manifest merge</text>

    <rect x="1170" y="496" width="192" height="82" rx="22" fill="#12283A" stroke="#36617D"/>
    <text x="1225" y="528" fill="#9AF8FF" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">OUTPUT</text>
    <text x="1197" y="556" fill="#F5FBFF" font-family="Segoe UI, Arial, sans-serif" font-size="24" font-weight="700">Adaptive proof layer</text>

    <path d="M1232 428H1272" stroke="url(#lineStroke)" stroke-width="7" stroke-linecap="round"/>
    <path d="M1348 470V516" stroke="url(#lineStroke)" stroke-width="7" stroke-linecap="round"/>
    <path d="M1336 516H1360" stroke="url(#lineStroke)" stroke-width="7" stroke-linecap="round"/>
    <circle cx="1272" cy="428" r="8.5" fill="#8AF7FF"/>
    <circle cx="1348" cy="516" r="8.5" fill="#86AFFF"/>
    <circle cx="1360" cy="516" r="8.5" fill="#8AF7FF"/>
  </g>
</svg>
