<svg width="1280" height="500" viewBox="0 0 1280 500" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Portfolio architecture map</title>
  <desc id="desc">Source data, runtime sync, build scripts, generated outputs, and Render deployment architecture for Ujala Portfolio.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1280" y2="500" gradientUnits="userSpaceOnUse"><stop stop-color="#070E19"/><stop offset="1" stop-color="#111925"/></linearGradient>
    <linearGradient id="line" x1="118" y1="242" x2="1160" y2="242" gradientUnits="userSpaceOnUse"><stop stop-color="#8DEFFF"/><stop offset="0.48" stop-color="#FFD29F"/><stop offset="1" stop-color="#8CF0C4"/></linearGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse"><path d="M40 0H0V40" stroke="#E6F9FF" stroke-opacity="0.05"/></pattern>
  </defs>
  <rect width="1280" height="500" rx="34" fill="url(#bg)"/>
  <rect width="1280" height="500" rx="34" fill="url(#grid)"/>
  <text x="72" y="70" fill="#8DEFFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="14" font-weight="900" letter-spacing="3">SYSTEM MAP</text>
  <text x="72" y="116" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="40" font-weight="900">Source-driven portfolio delivery.</text>
  <text x="72" y="150" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="18" font-weight="500">One source of truth feeds the public site, safe mirror, resume data, and Render deployment.</text>
  <path d="M168 252H1112" stroke="url(#line)" stroke-width="4" stroke-linecap="round"/>
  <circle cx="168" cy="252" r="9" fill="#8DEFFF"/><circle cx="404" cy="252" r="9" fill="#B8F0FF"/><circle cx="640" cy="252" r="9" fill="#FFD29F"/><circle cx="876" cy="252" r="9" fill="#BFEFB8"/><circle cx="1112" cy="252" r="9" fill="#8CF0C4"/>
  <g transform="translate(80 190)"><rect width="176" height="124" rx="22" fill="#0D1A2A" stroke="#8DEFFF" stroke-opacity="0.28"/><text x="24" y="44" fill="#8DEFFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="12" font-weight="900" letter-spacing="2">SOURCE</text><text x="24" y="78" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="19" font-weight="900">portfolio-data.js</text><text x="24" y="104" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="13" font-weight="600">Modes, projects, copy</text></g>
  <g transform="translate(316 190)"><rect width="176" height="124" rx="22" fill="#0D1B25" stroke="#B8F0FF" stroke-opacity="0.28"/><text x="24" y="44" fill="#B8F0FF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="12" font-weight="900" letter-spacing="2">SYNC</text><text x="24" y="78" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="19" font-weight="900">runtime JSON</text><text x="24" y="104" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="13" font-weight="600">Freshness and proof</text></g>
  <g transform="translate(552 190)"><rect width="176" height="124" rx="22" fill="#171A22" stroke="#FFD29F" stroke-opacity="0.3"/><text x="24" y="44" fill="#FFD29F" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="12" font-weight="900" letter-spacing="2">BUILD</text><text x="24" y="78" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="19" font-weight="900">npm run build</text><text x="24" y="104" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="13" font-weight="600">Render + safe mirror</text></g>
  <g transform="translate(788 190)"><rect width="176" height="124" rx="22" fill="#111C24" stroke="#BFEFB8" stroke-opacity="0.3"/><text x="24" y="44" fill="#BFEFB8" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="12" font-weight="900" letter-spacing="2">OUTPUT</text><text x="24" y="78" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="19" font-weight="900">dist / safe</text><text x="24" y="104" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="13" font-weight="600">Deployable artifacts</text></g>
  <g transform="translate(1024 190)"><rect width="176" height="124" rx="22" fill="#0D221F" stroke="#8CF0C4" stroke-opacity="0.3"/><text x="24" y="44" fill="#8CF0C4" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="12" font-weight="900" letter-spacing="2">LIVE</text><text x="24" y="78" fill="#F6FAFF" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="19" font-weight="900">Render</text><text x="24" y="104" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="13" font-weight="600">ujala-portfolio</text></g>
  <rect x="238" y="372" width="804" height="58" rx="20" fill="#0D1A2A" stroke="#8DEFFF" stroke-opacity="0.14"/>
  <text x="270" y="407" fill="#AFC1D2" font-family="Segoe UI, Aptos, Arial, sans-serif" font-size="15" font-weight="700">Resume system, robots, sitemap, README, and public links all follow the same canonical Render URL.</text>
</svg>
