  <text x="140" y="646" fill="#F4F6FB" font-family="Segoe UI, Arial, sans-serif" font-size="18" font-weight="600">Ujala Portfolio</text>
  <text x="140" y="698" fill="#F7FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">Making technical proof</text>
  <text x="140" y="758" fill="#F7FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="54" font-weight="800">feel premium and memorable</text>
  <text x="140" y="808" fill="#B8C4D0" font-family="Segoe UI, Arial, sans-serif" font-size="15" font-weight="500">Adaptive visitor modes, GitHub-synced project branding, richer storytelling, and live product evidence.</text>
