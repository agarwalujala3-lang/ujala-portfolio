      <text x="358" y="176" fill="#89F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">ANALYZE + CHAT</text>
      <text x="340" y="198" fill="#C7D4DE" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Repo analysis, compare mode,</text>
      <text x="340" y="217" fill="#C7D4DE" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Mermaid maps, guided output</text>

      <rect x="112" y="226" width="428" height="60" rx="18" fill="#0E131D" stroke="#263141"/>
