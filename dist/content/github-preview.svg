      <stop offset="0.56" stop-color="#0A1220"/>
      <stop offset="1" stop-color="#111B2C"/>
    </linearGradient>
    <radialGradient id="haloLeft" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(174 112) rotate(15) scale(436 254)">
