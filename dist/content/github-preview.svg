  <path d="M960 510L1028 540" stroke="#C1C8D2" stroke-opacity="0.58" stroke-width="2"/>
  <circle cx="960" cy="510" r="12" fill="#0E1623" stroke="#C3CBD5"/>
  <circle cx="960" cy="510" r="4.5" fill="#F4F8FC"/>
  <text x="1044" y="546" fill="#EDF2F7" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="600">Lens-aware</text>
  <text x="1044" y="563" fill="#9FAAB9" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="500">visitor routes</text>

