      <feGaussianBlur stdDeviation="22"/>
      <feColorMatrix type="matrix" values="0 0 0 0 0.0156863 0 0 0 0 0.0235294 0 0 0 0 0.0431373 0 0 0 0.34 0"/>
      <feBlend in="SourceGraphic" in2="BackgroundImageFix" result="shape"/>
    </filter>
    <filter id="objectShadow" x="432" y="148" width="800" height="572" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feOffset dy="24"/>
      <feGaussianBlur stdDeviation="30"/>
