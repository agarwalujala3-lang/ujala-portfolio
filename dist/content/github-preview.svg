      <stop offset="1" stop-color="#D6B7FF" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="haloRight" cx="0" cy="0" r="1" gradientUnits="userSpaceOnUse" gradientTransform="translate(1296 752) rotate(155) scale(418 260)">
      <stop stop-color="#6BEAFF" stop-opacity="0.22"/>
