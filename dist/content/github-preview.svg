      <text x="146" y="176" fill="#89F0FF" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700">LIVE AWS</text>
      <text x="128" y="198" fill="#C7D4DE" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Private uploads +</text>
      <text x="128" y="217" fill="#C7D4DE" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">duplicate review flow</text>

      <rect x="324" y="88" width="216" height="118" rx="22" fill="#111827" stroke="url(#miniCardStroke)"/>
      <text x="340" y="112" fill="#8BA1B3" font-family="Segoe UI, Arial, sans-serif" font-size="11" font-weight="700" letter-spacing="0.18em">AI PRODUCT</text>
