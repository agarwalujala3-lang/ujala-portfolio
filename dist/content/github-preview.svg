  <text x="1246" y="387" fill="#C6D3DE" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">Live proof, systems routes,</text>
  <text x="1246" y="404" fill="#C6D3DE" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="500">brain answers, PDF resumes</text>

  <text x="1212" y="472" fill="#F7FAFF" font-family="Segoe UI, Arial, sans-serif" font-size="14" font-weight="700">About this portfolio</text>
  <text x="1212" y="498" fill="#B7C4D0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">Built to make engineering depth,</text>
  <text x="1212" y="518" fill="#B7C4D0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">product taste, and live execution</text>
  <text x="1212" y="538" fill="#B7C4D0" font-family="Segoe UI, Arial, sans-serif" font-size="13" font-weight="500">easier to feel in one glance.</text>

