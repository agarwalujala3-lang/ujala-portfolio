  <ellipse cx="1296" cy="752" rx="420" ry="266" fill="url(#haloRight)"/>

  <rect x="116" y="58" width="1368" height="62" rx="16" fill="url(#navFill)" fill-opacity="0.86" stroke="#222B3B"/>

  <rect x="138" y="78" width="24" height="24" rx="7" fill="#0F1420" stroke="#59627A"/>
  <path d="M144 84L156 96" stroke="#F2F6FA" stroke-width="1.8" stroke-linecap="round"/>
