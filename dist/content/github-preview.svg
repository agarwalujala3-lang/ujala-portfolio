<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Ujala Agarwal Portfolio cinematic GitHub preview</title>
  <desc id="desc">A cinematic premium preview for the Ujala Agarwal portfolio with layered project surfaces, runtime callouts, and a luxury product landing composition.</desc>
  <defs>
    <linearGradient id="pageBg" x1="66" y1="28" x2="1522" y2="862" gradientUnits="userSpaceOnUse">
